name: Feature Request
description: Propose a new feature or enhancement for c2pa-vtt
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem or limitation are you running into?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you considered and why they fall short.
    validations:
      required: false
